codecov:
  require_ci_to_pass: true
  notify:
    # Publish the head report without waiting for every matrix leg to upload.
    after_n_builds: 1
    wait_for_ci: false
  # Go coverprofiles include module import paths; map them to repo paths.
  fixes:
    - "github.com/goforj/queue/::"
    - "/home/runner/work/queue/queue/::"

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 1%

flags:
  integration:
    carryforward: true

comment:
  layout: "reach,diff,flags,tree"
