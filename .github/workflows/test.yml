name: Go Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  integration-scenarios-contract-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify integration scenarios contract coverage
        run: .github/scripts/check_integration_scenarios_contract.sh

  integration-matrix-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure integration matrix covers all required backends
        run: |
          set -euo pipefail
          matrix_line="$(awk '/backend: \[/{print; exit}' .github/workflows/test.yml)"
          test -n "$matrix_line"
          for backend in redis mysql postgres sqlite nats sqs rabbitmq; do
            if ! echo "$matrix_line" | grep -Eq "(^|[^a-z])${backend}([^a-z]|$)"; then
              echo "missing required integration backend in matrix: ${backend}"
              exit 1
            fi
          done

  unit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install dependencies
        run: go mod tidy

      - name: Run unit tests
        run: go test ./... -v

      - name: Run unit tests with coverage
        run: go test ./... -covermode=atomic -coverprofile=coverage.txt

      - name: Verify unit coverage profile
        run: |
          test -s coverage.txt
          echo "unit coverage lines: $(wc -l < coverage.txt)"
          head -n 5 coverage.txt

      - name: Upload results to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.txt
          name: unit-coverage
          disable_search: true
          verbose: true
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  race:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install dependencies
        run: go mod tidy

      - name: Run race tests
        run: go test -race ./...

  integration:
    needs: [integration-matrix-guard, integration-scenarios-contract-guard]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [redis, mysql, postgres, sqlite, nats, sqs, rabbitmq]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install dependencies
        run: go mod tidy

      - name: Run integration tests
        env:
          RUN_INTEGRATION: "1"
          INTEGRATION_BACKEND: ${{ matrix.backend }}
        run: go test -tags integration ./... -covermode=atomic -coverprofile=coverage-integration-${{ matrix.backend }}.txt

      - name: Verify integration coverage profile
        run: |
          file="coverage-integration-${{ matrix.backend }}.txt"
          test -s "$file"
          echo "integration (${{ matrix.backend }}) coverage lines: $(wc -l < "$file")"
          head -n 5 "$file"

      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-integration-${{ matrix.backend }}.txt
          flags: integration
          name: integration-${{ matrix.backend }}
          disable_search: true
          verbose: true
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration-scenarios:
    needs: [integration-matrix-guard, integration-scenarios-contract-guard]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [redis, mysql, postgres, sqlite, nats, sqs, rabbitmq]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install dependencies
        run: go mod tidy

      - name: Run integration scenario suite
        env:
          RUN_INTEGRATION: "1"
          INTEGRATION_BACKEND: ${{ matrix.backend }}
        run: go test -tags integration ./... -run '^TestIntegrationScenarios_AllBackends$'
