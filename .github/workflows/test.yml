name: Go Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  integration-scenarios-contract-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify integration scenarios contract coverage
        run: .github/scripts/check_integration_scenarios_contract.sh

  integration-matrix-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure integration matrix covers all required backends
        run: |
          set -euo pipefail
          matrix_line="$(awk '/backend: \[/{print; exit}' .github/workflows/test.yml)"
          test -n "$matrix_line"
          for backend in redis mysql postgres sqlite nats sqs rabbitmq; do
            if ! echo "$matrix_line" | grep -Eq "(^|[^a-z])${backend}([^a-z]|$)"; then
              echo "missing required integration backend in matrix: ${backend}"
              exit 1
            fi
          done

  unit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./... -v

      - name: Run unit tests with coverage
        run: go test -coverprofile=coverage.raw.txt ./...

      - name: Normalize Go coverage paths
        run: |
          sed -E 's#^github.com/goforj/queue/##' coverage.raw.txt > coverage.txt
          test -s coverage.txt
          head -n 5 coverage.txt

      - name: Upload results to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.txt
          disable_search: true
          fail_ci_if_error: true
          verbose: true
          flags: unit
          name: unit-coverage
          slug: goforj/queue
          override_commit: ${{ github.sha }}
          override_branch: ${{ github.ref_name }}
          token: ${{ secrets.CODECOV_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

  race:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install dependencies
        run: go mod download

      - name: Run race tests
        run: go test -race ./...

  integration:
    needs: [integration-matrix-guard, integration-scenarios-contract-guard]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [redis, mysql, postgres, sqlite, nats, sqs, rabbitmq]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install dependencies
        run: go mod download

      - name: Run integration tests
        env:
          RUN_INTEGRATION: "1"
          INTEGRATION_BACKEND: ${{ matrix.backend }}
        run: go test -tags integration ./...

  integration-scenarios:
    needs: [integration-matrix-guard, integration-scenarios-contract-guard]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [redis, mysql, postgres, sqlite, nats, sqs, rabbitmq]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install dependencies
        run: go mod download

      - name: Run integration scenario suite
        env:
          RUN_INTEGRATION: "1"
          INTEGRATION_BACKEND: ${{ matrix.backend }}
        run: go test -tags integration ./... -run '^TestIntegrationScenarios_AllBackends$'
